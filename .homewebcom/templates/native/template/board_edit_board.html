<!-- design=frameset_community_reg -->
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card forum-form-card">
        <div class="card-header">
          <h2 class="h4 mb-0"><i class="fa fa-pencil"></i> Kategorie bearbeiten</h2>
        </div>
        <div class="card-body">
          <form method="POST" name="tread" action="%PATH_[board]%&cat=%cat%&edit_cat=true" target="_top" accept-charset="utf-8">
            <div class="form-group">
              <label for="edit-topic">Name</label>
              <input id="edit-topic" class="form-control" name="topic" value="%topic%" required autofocus>
            </div>
            <div class="form-group">
              <label for="edit-description">Beschreibung</label>
              <textarea id="edit-description" class="form-control" name="description" rows="4" required>%description%</textarea>
            </div>
            <div class="d-flex justify-content-between">
              <a href="%PATH_[board]%" class="btn btn-outline-secondary"><i class="fa fa-times"></i> Abbrechen</a>
              <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> Kategorie bearbeiten</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
