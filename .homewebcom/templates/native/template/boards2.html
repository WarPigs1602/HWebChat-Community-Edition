<!-- design=frameset_community_reg -->
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">%SERVER_SOFTWARE%-Forum</h1>
        <a href="%PATH_[board]%" class="btn btn-outline-secondary btn-sm">
          <i class="fa fa-arrow-left"></i> Zurück
        </a>
      </div>

      <nav aria-label="Thread-Navigation" class="mb-3">
        <ul class="pagination justify-content-center">%prev% %pages% %next%</ul>
      </nav>

      <div class="card mb-4">
        <div class="card-body">
          <form method="POST" name="login" action="%PATH_[board]%" target="_top" accept-charset="utf-8" class="input-group">
            <input class="form-control" name="search" placeholder="In diesem Forum suchen...">
            <input name="skin" value="%skin%" type="hidden">
            <div class="input-group-append">
              <button class="btn btn-primary" type="submit"><i class="fa fa-search"></i> Suchen</button>
            </div>
          </form>
        </div>
      </div>

      <div class="forum-threads mb-4">%boards%</div>

      <div class="card forum-reply-card">
        <div class="card-header">
          <h5 class="mb-0"><i class="fa fa-reply"></i> Antwort verfassen</h5>
        </div>
        <div class="card-body">
          <form method="POST" name="thread" action="%PATH_[board]%&id=%id%&answer=true&pid=%pid%" target="_top" accept-charset="utf-8">
            <div class="form-group">
              <label for="reply-topic">Betreff</label>
              <input id="reply-topic" class="form-control" name="topic" value="%re%%topic%" required>
            </div>
            <div class="form-group">
              <label for="reply-content">Nachricht</label>
              <div class="btn-toolbar mb-2" role="toolbar" aria-label="BB-Code Toolbar">
                <div class="btn-group btn-group-sm mr-2" role="group" aria-label="Textformatierung">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','b')" title="Fett"><i class="fa fa-bold"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','i')" title="Kursiv"><i class="fa fa-italic"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','u')" title="Unterstrichen"><i class="fa fa-underline"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','s')" title="Durchgestrichen"><i class="fa fa-strikethrough"></i></button>
                </div>
                <div class="btn-group btn-group-sm mr-2" role="group" aria-label="Ausrichtung & Sonderformatierung">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','center')" title="Zentriert"><i class="fa fa-align-center"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','quote')" title="Zitat"><i class="fa fa-quote-right"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','code')" title="Code"><i class="fa fa-code"></i></button>
                </div>
                <div class="btn-group btn-group-sm" role="group" aria-label="Link, Bild & Farbe">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','url')" title="Link"><i class="fa fa-link"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','img')" title="Bild"><i class="fa fa-image"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('reply-content','email')" title="E-Mail"><i class="fa fa-envelope"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBColor('reply-content')" title="Farbe"><i class="fa fa-tint"></i></button>
                </div>
              </div>
              <textarea id="reply-content" class="form-control" name="thread" rows="6" required></textarea>
            </div>
            <button class="btn btn-success" type="submit">
              <i class="fa fa-paper-plane"></i> Antwort absenden
            </button>
          </form>
        </div>
      </div>

      <nav aria-label="Thread-Navigation" class="mt-4">
        <ul class="pagination justify-content-center">%prev% %pages% %next%</ul>
      </nav>
    </div>
  </div>
</div>
<script>
(function() {
  function getArea(areaId) {
    var area = document.getElementById(areaId);
    return area && area.tagName.toLowerCase() === 'textarea' ? area : null;
  }
  function insertAtCursor(area, before, after) {
    var start = area.selectionStart || 0;
    var end = area.selectionEnd || 0;
    var text = area.value || '';
    var selected = text.substring(start, end);
    area.value = text.substring(0, start) + before + selected + after + text.substring(end);
    area.focus();
    var pos = start + before.length;
    if (selected) {
      pos = start + before.length + selected.length + after.length;
    }
    area.setSelectionRange(pos, pos);
  }
  window.insertBBCode = function(areaId, tag) {
    var area = getArea(areaId);
    if (!area || !tag) return;
    tag = String(tag).toLowerCase();
    var open, close, value;
    switch (tag) {
      case 'url':
        var url = prompt('URL eingeben:', 'https://');
        if (url === null) return;
        url = url.trim() || 'https://';
        var start = area.selectionStart || 0;
        var end = area.selectionEnd || 0;
        var text = area.value || '';
        var selected = text.substring(start, end);
        var linkText = selected || url;
        insertAtCursor(area, '[url=' + url + ']', '[/url]');
        return;
      case 'img':
        var imgUrl = prompt('Bild-URL eingeben:', 'https://');
        if (imgUrl === null) return;
        imgUrl = imgUrl.trim();
        if (!imgUrl) return;
        insertAtCursor(area, '[img]' + imgUrl + '[/img]', '');
        return;
      case 'email':
        var mail = prompt('E-Mail-Adresse eingeben:', '');
        if (mail === null) return;
        mail = mail.trim();
        if (!mail) return;
        insertAtCursor(area, '[email]' + mail + '[/email]', '');
        return;
      default:
        open = '[' + tag + ']';
        close = '[/' + tag + ']';
    }
    insertAtCursor(area, open, close);
  };
  window.insertBBColor = function(areaId) {
    var area = getArea(areaId);
    if (!area) return;
    var color = prompt('Farbe als Hex-Wert eingeben (z. B. ff0000):', 'ff0000');
    if (color === null) return;
    color = color.replace(/^#/, '').trim() || '000000';
    insertAtCursor(area, '[color=' + color + ']', '[/color]');
  };
})();
</script>
