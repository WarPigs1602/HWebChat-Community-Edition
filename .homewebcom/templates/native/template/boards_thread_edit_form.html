<!-- design=frameset_community_reg -->
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card forum-form-card">
        <div class="card-header">
          <h2 class="h4 mb-0"><i class="fa fa-pencil"></i> Beitrag bearbeiten</h2>
        </div>
        <div class="card-body">
          <form method="POST" name="thread" action="%PATH_[board]%&id=%id%&pid=%pid%&edit=true&edited=true" target="_top" accept-charset="utf-8">
            <div class="form-group">
              <label for="edit-topic">Titel</label>
              <input id="edit-topic" class="form-control" name="topic" value="%topic%" maxlength="255" required autofocus>
            </div>
            <div class="form-group">
              <label for="edit-content">Beitrag</label>
              <div class="btn-toolbar mb-2" role="toolbar" aria-label="BB-Code Toolbar">
                <div class="btn-group btn-group-sm mr-2" role="group" aria-label="Textformatierung">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','b')" title="Fett"><i class="fa fa-bold"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','i')" title="Kursiv"><i class="fa fa-italic"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','u')" title="Unterstrichen"><i class="fa fa-underline"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','s')" title="Durchgestrichen"><i class="fa fa-strikethrough"></i></button>
                </div>
                <div class="btn-group btn-group-sm mr-2" role="group" aria-label="Ausrichtung & Sonderformatierung">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','center')" title="Zentriert"><i class="fa fa-align-center"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','quote')" title="Zitat"><i class="fa fa-quote-right"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','code')" title="Code"><i class="fa fa-code"></i></button>
                </div>
                <div class="btn-group btn-group-sm" role="group" aria-label="Link, Bild & Farbe">
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','url')" title="Link"><i class="fa fa-link"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','img')" title="Bild"><i class="fa fa-image"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBCode('edit-content','email')" title="E-Mail"><i class="fa fa-envelope"></i></button>
                  <button type="button" class="btn btn-outline-secondary" onclick="insertBBColor('edit-content')" title="Farbe"><i class="fa fa-tint"></i></button>
                </div>
              </div>
              <textarea id="edit-content" class="form-control" name="thread" rows="10" required>%content%</textarea>
            </div>
            <div class="d-flex justify-content-between">
              <a href="%PATH_[board]%&pid=%pid%&id=%id%" class="btn btn-outline-secondary"><i class="fa fa-times"></i> Abbrechen</a>
              <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> Speichern</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  function getArea(areaId) {
    var area = document.getElementById(areaId);
    return area && area.tagName.toLowerCase() === 'textarea' ? area : null;
  }
  function insertAtCursor(area, before, after) {
    var start = area.selectionStart || 0;
    var end = area.selectionEnd || 0;
    var text = area.value || '';
    var selected = text.substring(start, end);
    area.value = text.substring(0, start) + before + selected + after + text.substring(end);
    area.focus();
    var pos = start + before.length;
    if (selected) {
      pos = start + before.length + selected.length + after.length;
    }
    area.setSelectionRange(pos, pos);
  }
  window.insertBBCode = function(areaId, tag) {
    var area = getArea(areaId);
    if (!area || !tag) return;
    tag = String(tag).toLowerCase();
    var open, close;
    switch (tag) {
      case 'url':
        var url = prompt('URL eingeben:', 'https://');
        if (url === null) return;
        url = url.trim() || 'https://';
        insertAtCursor(area, '[url=' + url + ']', '[/url]');
        return;
      case 'img':
        var imgUrl = prompt('Bild-URL eingeben:', 'https://');
        if (imgUrl === null) return;
        imgUrl = imgUrl.trim();
        if (!imgUrl) return;
        insertAtCursor(area, '[img]' + imgUrl + '[/img]', '');
        return;
      case 'email':
        var mail = prompt('E-Mail-Adresse eingeben:', '');
        if (mail === null) return;
        mail = mail.trim();
        if (!mail) return;
        insertAtCursor(area, '[email]' + mail + '[/email]', '');
        return;
      default:
        open = '[' + tag + ']';
        close = '[/' + tag + ']';
    }
    insertAtCursor(area, open, close);
  };
  window.insertBBColor = function(areaId) {
    var area = getArea(areaId);
    if (!area) return;
    var color = prompt('Farbe als Hex-Wert eingeben (z. B. ff0000):', 'ff0000');
    if (color === null) return;
    color = color.replace(/^#/, '').trim() || '000000';
    insertAtCursor(area, '[color=' + color + ']', '[/color]');
  };
})();
</script>
