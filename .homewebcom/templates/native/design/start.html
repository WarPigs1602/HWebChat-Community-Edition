<!DOCTYPE html>
<html lang="de">
<head>
  <title>%SERVER_SOFTWARE%</title>
  <meta content="%SERVER_VENDOR%" name="author">
  <meta content="&copy;%SERVER_YEAR% by %SERVER_VENDOR%" name="description">
  <meta content="CoolChat" name="software">
  <meta content="text/html; charset=UTF-8" http-equiv="content-type">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preload" href="file/fonts/TwitterColorEmoji-SVGinOT.ttf" as="font">
  <link rel="preload" href="file/fonts/NotoColorEmoji.ttf" as="font">
  <link rel="stylesheet" href="%path_file%bootstrap/css/bootstrap.min.css" type="text/css">
  <link rel="stylesheet" media="screen" href="%PATH_[style]%" type="text/css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="%PATH_[script_jquery]%"></script>
  <script src="%path_file%popper/js/popper.min.js"></script>
  <script src="%path_file%bootstrap/js/bootstrap.min.js"></script>
  <script src="%PATH_[script_framekiller]%"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="%PATH_[index]%">
      <img src="file/gfx/logo.svg" alt="HWebChat" style="height: 40px;">
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Navigation umschalten">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item active">
          <a class="nav-link" href="%PATH_[index]%"><i class="fa fa-home"></i> Startseite</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="%PATH_[rules]%"><i class="fa fa-info-circle"></i> Chattiquette</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="%PATH_[toplist]%"><i class="fa fa-trophy"></i> Topliste</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="%PATH_[login]%&skin=%skin%"><i class="fa fa-sign-in"></i> Gastzugang</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="loginDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <i class="fa fa-user"></i> Login
          </a>
          <div class="dropdown-menu dropdown-menu-right p-2" aria-labelledby="loginDropdown">
            <form method="POST" name="login" action="%PATH_[login]%" target="_top" accept-charset="utf-8" class="form-inline">
              <input class="form-control form-control-sm mr-2 mb-2" maxlength="20" name="nick" placeholder="Nickname" style="width: 120px;">
              <input class="form-control form-control-sm mr-2 mb-2" maxlength="20" name="pwd" type="password" placeholder="Passwort" style="width: 120px;">
              <input name="skin" value="%skin%" type="hidden">
              <input class="btn btn-sm btn-primary mb-2" value="Login" type="submit">
            </form>
            <div class="dropdown-divider"></div>
            <a class="dropdown-item" href="%PATH_[register]%"><i class="fa fa-user-plus"></i> Registrieren</a>
            <a class="dropdown-item" href="%PATH_[password]%"><i class="fa fa-key"></i> Passwort Vergessen?</a>
          </div>
        </li>
          <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" href="#" id="langDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        <i class="fa fa-language"></i> Sprache
      </a>
      <div class="dropdown-menu dropdown-menu-right" aria-labelledby="langDropdown">
        <a class="dropdown-item" href="javascript:setLang('de')">Deutsch</a>
        <a class="dropdown-item" href="javascript:setLang('en')">English</a>
      </div>
    </li>
</ul>
    </div>
  </div>
</nav>
<div id="pagecontent" class="container-fluid page-main">
%content%
</div>
<div class="container-fluid text-center page-footer">
  <small>
    <p>
      &copy;%SERVER_YEAR% by <a href="mailto:%SERVER_MAIL%">%SERVER_VENDOR%</a>
      <br>
      <a href="%PATH_[dataprotection]%" target="_blank">Datenschutz</a> | <a href="%PATH_[impressum]%" target="_blank">Impressum</a>
    </p>
  </small>
</div>



<script>
function setLang(l) {
  document.cookie = 'lang=' + l + ';path=/;max-age=' + 60*60*24*365;
  var isChatPage = document.querySelector('#chat_window, #chat_frame_container, .chat-privchat-shell') !== null;
  if (isChatPage) {
    var base = window.location.href.split('#')[0].split('?')[0];
    fetch(base + '?lang=' + l, {credentials: 'same-origin'});
  } else {
    var url = new URL(window.location.href);
    url.searchParams.set('lang', l);
    window.location.href = url.toString();
  }
}
</script></body>
</html>
